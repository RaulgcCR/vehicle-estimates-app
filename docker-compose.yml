version: "3.9"

services:
  backend:
    build: ./backend
    container_name: vehicle-estimates-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./backend/vehicle_estimates.db:/app/vehicle_estimates.db
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./vehicle_estimates.db}
      - SECRET_KEY=${SECRET_KEY:-your_secret_key_here}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-600}
      - DEMO_USERNAME=${DEMO_USERNAME:-admin}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-Admin123}
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: vehicle-estimates-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge