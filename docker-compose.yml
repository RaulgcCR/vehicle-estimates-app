version: "3.9"

services:
  backend:
    build: ./backend
    container_name: vehicle-estimates-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/vehicle_estimates.db:/app/vehicle_estimates.db
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: vehicle-estimates-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app-network

networks:
  app-network:
    driver: bridge